version: '3.8'

services:
  # Ollama service for LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: ercot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8G      # Limit Ollama to 8GB RAM (adjust based on your system)
        reservations:
          memory: 4G

  # ERCOT Grid Agent application
  agent:
    build: .
    container_name: ercot-agent
    depends_on:
      - ollama
    environment:
      - INFERENCE_BACKEND=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - CHROMA_PERSIST_DIR=/app/.chroma_db
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./.env:/app/.env
      - chroma_data:/app/.chroma_db
    deploy:
      resources:
        limits:
          memory: 4G      # Limit agent to 4GB RAM
        reservations:
          memory: 2G
    stdin_open: true
    tty: true
    command: /bin/bash

  # Ingestion service (run separately)
  ingest:
    build: .
    container_name: ercot-ingest
    depends_on:
      - ollama
    environment:
      - INFERENCE_BACKEND=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - CHROMA_PERSIST_DIR=/app/.chroma_db
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./.env:/app/.env
      - chroma_data:/app/.chroma_db
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    profiles:
      - ingest      # Only run when explicitly specified
    command: uv run python scripts/ingest.py --live

volumes:
  ollama_data:
  chroma_data:
